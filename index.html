    <script>
        var STORAGE_KEY = 'guoqiLeMe_v9';
        
        // ========== Supabase 相关 ==========
        var supabaseClient = null;
        var currentUser = null;
        var currentHouseId = null;
        var houses = [];
        var isRegisterMode = false;
        
        // 初始化 Supabase
        function initSupabase() {
            if (typeof window.supabase !== 'undefined') {
                supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
                console.log('[Supabase] Initialized');
                return true;
            }
            console.log('[Supabase] SDK not loaded yet');
            return false;
        }
        
        // 检查认证状态
        async function checkAuthState() {
            if (!supabaseClient) {
                if (!initSupabase()) {
                    setTimeout(checkAuthState, 500);
                    return;
                }
            }
            
            try {
                var session = await supabaseClient.auth.getSession();
                if (session.data.session) {
                    currentUser = session.data.session.user;
                    console.log('[Auth] User logged in:', currentUser.email);
                    await onUserLoggedIn();
                } else {
                    console.log('[Auth] No session');
                    updateAuthUI();
                    showNotLoggedInUI();
                }
            } catch (err) {
                console.error('[Auth] Error:', err);
            }
            
            // 监听认证状态变化
            supabaseClient.auth.onAuthStateChange(async function(event, session) {
                console.log('[Auth] State changed:', event);
                if (event === 'SIGNED_IN' && session) {
                    currentUser = session.user;
                    await onUserLoggedIn();
                } else if (event === 'SIGNED_OUT') {
                    currentUser = null;
                    currentHouseId = null;
                    houses = [];
                    updateAuthUI();
                    renderHouseSelector();
                    // 退出登录后清空物品并显示未登录提示
                    items = [];
                    showNotLoggedInUI();
                }
            });
        }
        
        // 用户登录后初始化
        async function onUserLoggedIn() {
            updateAuthUI();
            await loadHouses();
            await syncLocalToCloud();
            renderHouseSelector();
            // 登录后加载并渲染物品
            loadItems();
            renderItems();
            checkUrgentItems();
        }
        
        // 更新认证 UI
        function updateAuthUI() {
            var authArea = document.getElementById('authArea');
            var houseSelector = document.getElementById('houseSelector');
            var settingsBtn = document.getElementById('settingsBtn');
            var loginBtn = document.getElementById('loginBtn');
            var authUserEl = document.getElementById('authUser');
            if (!authArea) return;
            
            if (currentUser) {
                // 只更新登录按钮区域，不替换整个innerHTML（避免移除houseSelector）
                if (loginBtn) loginBtn.style.display = 'none';
                if (authUserEl) {
                    authUserEl.style.display = 'flex';
                    var emailSpan = document.getElementById('authUserEmail');
                    if (emailSpan) emailSpan.textContent = currentUser.email;
                }
                // 显示房子选择器
                if (houseSelector) houseSelector.classList.add('show');
                if (settingsBtn) settingsBtn.style.display = 'flex';
            } else {
                // 显示登录按钮
                if (loginBtn) loginBtn.style.display = 'flex';
                if (authUserEl) authUserEl.style.display = 'none';
                // 隐藏房子选择器
                if (houseSelector) houseSelector.classList.remove('show');
                if (settingsBtn) settingsBtn.style.display = 'none';
            }
        }
        
        // ========== 设置面板相关 ==========
        
        // 打开设置面板
        function openSettingsModal() {
            if (!currentUser) {
                showToast('请先登录');
                openAuthModal();
                return;
            }
            
            document.getElementById('settingsModal').classList.add('show');
            document.body.style.overflow = 'hidden';
            
            // 加载当前房子信息
            loadCurrentHouseInfo();
            
            // 加载成员列表
            loadHouseMembers();
            
            // 检查并显示当前有效的邀请码
            checkAndDisplayInviteCode();
            
            // 重置加入结果
            document.getElementById('joinResult').classList.remove('show');
            document.getElementById('joinHouseCode').value = '';
        }
        
        // 检查并显示有效的邀请码
        function checkAndDisplayInviteCode() {
            var codeInput = document.getElementById('inviteCodeInput');
            var copyBtn = document.getElementById('inviteCopyBtn');
            var hintEl = document.getElementById('inviteCodeHint');
            var labelEl = document.getElementById('inviteCodeLabel');
            
            try {
                var saved = localStorage.getItem('guoqiLeMe_currentInviteCode');
                if (!saved) {
                    // 没有邀请码，显示提示
                    codeInput.value = '';
                    codeInput.placeholder = '点击上方按钮生成';
                    copyBtn.style.display = 'none';
                    hintEl.textContent = '邀请码有效期7天';
                    hintEl.style.color = '';
                    return;
                }
                
                var data = JSON.parse(saved);
                
                // 检查是否属于当前房子
                if (data.houseId !== currentHouseId) {
                    codeInput.value = '';
                    codeInput.placeholder = '点击上方按钮生成';
                    copyBtn.style.display = 'none';
                    hintEl.textContent = '邀请码有效期7天';
                    return;
                }
                
                // 检查是否过期
                if (data.expiresAt) {
                    var now = new Date();
                    var expiresAt = new Date(data.expiresAt);
                    if (expiresAt <= now) {
                        // 已过期，移除
                        localStorage.removeItem('guoqiLeMe_currentInviteCode');
                        codeInput.value = '';
                        codeInput.placeholder = '点击上方按钮生成';
                        copyBtn.style.display = 'none';
                        hintEl.textContent = '邀请码有效期7天';
                        return;
                    }
                    
                    // 计算剩余天数
                    var daysLeft = Math.ceil((expiresAt - now) / (1000 * 60 * 60 * 24));
                    daysLeft = Math.max(0, Math.min(7, daysLeft));
                    
                    // 显示邀请码
                    codeInput.value = data.code;
                    copyBtn.style.display = 'flex';
                    hintEl.innerHTML = '🎉 邀请码有效，剩余 <b style="color: var(--warning);">' + daysLeft + '</b> 天，点击复制分享给家人';
                    hintEl.style.color = 'var(--primary-dark)';
                    hintEl.style.fontWeight = '600';
                } else {
                    // 没有过期时间，显示邀请码
                    codeInput.value = data.code;
                    copyBtn.style.display = 'flex';
                    hintEl.textContent = '点击复制分享给家人';
                }
            } catch (e) {
                console.log('[Invite] Check error:', e);
                codeInput.value = '';
                copyBtn.style.display = 'none';
            }
        }
        
        // 关闭设置面板
        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('show');
            document.body.style.overflow = '';
        }

        // 加载房子成员
        async function loadHouseMembers() {
            if (!currentHouseId) {
                document.getElementById('memberList').innerHTML = '<div class="member-loading">请先选择一个房子</div>';
                return;
            }
            
            try {
                // 获取房子信息
                var houseResult = await supabaseClient
                    .from('houses')
                    .select('*')
                    .eq('id', currentHouseId)
                    .single();
                
                if (houseResult.error) throw houseResult.error;
                
                var house = houseResult.data;
                var members = [];
                
                // 获取房主信息
                if (house.user_id) {
                    var ownerProfile = await getUserProfile(house.user_id);
                    members.push({
                        userId: house.user_id,
                        email: ownerProfile?.email || '房主',
                        role: 'owner'
                    });
                }
                
                // 获取成员信息
                var membersResult = await supabaseClient
                    .from('house_members')
                    .select('*')
                    .eq('house_id', currentHouseId);
                
                if (!membersResult.error && membersResult.data) {
                    for (var i = 0; i < membersResult.data.length; i++) {
                        var member = membersResult.data[i];
                        if (member.user_id !== house.user_id) {
                            var profile = await getUserProfile(member.user_id);
                            members.push({
                                userId: member.user_id,
                                email: profile?.email || '成员',
                                role: 'member'
                            });
                        }
                    }
                }
                
                renderMemberList(members);
            } catch (err) {
                console.error('[Members] Load error:', err);
                document.getElementById('memberList').innerHTML = '<div class="member-loading">加载失败</div>';
            }
        }

                    .from('profiles')
                    .select('*')

        // 渲染成员列表

            if (!members || members.length === 0) {

        // 生成邀请码
        async function generateInviteCode() {
            if (!currentUser || !currentHouseId) {
                showToast('请先登录并选择房子');
                return;
            }
            
            var btn = document.getElementById('generateInviteBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span><span>生成中...</span>';
            
            try {
                // 生成6位邀请码
                var code = generateRandomCode(6);
                
                // 计算过期时间（7天后）
                var expiresAt = new Date();
                expiresAt.setDate(expiresAt.getDate() + 7);
                
                // 尝试插入到 invite_codes 表
                var result = await supabaseClient
                    .from('invite_codes')
                    .insert({
                        code: code,
                        house_id: currentHouseId,
                        created_by: currentUser.id,
                        expires_at: expiresAt.toISOString()
                    })
                    .select()
                    .single();
                
                if (result.error) {
                    // 如果表不存在，尝试使用 localStorage 方案
                    console.log('[Invite] Table may not exist, using localStorage');
                    saveInviteCodeToLocal(code, currentHouseId);
                }
                
                // 获取当前房子名称用于显示
                var currentHouseName = '家庭共享房子';
                var currentHouse = houses.find(function(h) { return h.id === currentHouseId; });
                if (currentHouse && currentHouse.name) {
                    currentHouseName = currentHouse.name;
                }
                
                // 保存到localStorage（包含房子名称，以便加入时使用）
                localStorage.setItem('guoqiLeMe_currentInviteCode', JSON.stringify({
                    code: code,
                    houseId: currentHouseId,
                    houseName: currentHouseName,
                    expiresAt: expiresAt.toISOString()
                }));
                
                // 同时保存邀请码到 guoqiLeMe_inviteCodes（用于恢复之前的邀请码）
                var allCodes = JSON.parse(localStorage.getItem('guoqiLeMe_inviteCodes') || '{}');
                allCodes[code] = {
                    houseId: currentHouseId,
                    houseName: currentHouseName,
                    expiresAt: expiresAt.toISOString()
                };
                localStorage.setItem('guoqiLeMe_inviteCodes', JSON.stringify(allCodes));
                
                console.log('[Invite] 已保存邀请码到 localStorage:', code, '房子:', currentHouseName);
                
                // 显示邀请码 - 设置面板
                var codeInput = document.getElementById('inviteCodeInput');
                var copyBtn = document.getElementById('inviteCopyBtn');
                var hintEl = document.getElementById('inviteCodeHint');
                
                codeInput.value = code;
                codeInput.placeholder = code;
                copyBtn.style.display = 'flex';
                
                // 显示高亮提示
                hintEl.innerHTML = '🎉 邀请码 <b style="color: var(--primary); font-size: 1.1em;">' + code + '</b> 已生成！点击复制分享给家人';
                hintEl.style.color = 'var(--primary-dark)';
                hintEl.style.fontWeight = '600';
                
                // 添加高亮动画效果
                codeInput.style.animation = 'none';
                codeInput.offsetHeight;
                codeInput.style.animation = 'inviteCodePop 0.5s ease';
                
                // 滚动到邀请码显示区域
                var inviteDisplay = document.getElementById('inviteCodeDisplay');
                if (inviteDisplay) {
                    inviteDisplay.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                
                showToast('邀请码: ' + code);
                
                // 3秒后恢复按钮
                setTimeout(function() {
                    btn.disabled = false;
                    btn.innerHTML = '<span>🎫</span><span>重新生成</span>';
                }, 3000);
                
            } catch (err) {
                console.error('[Invite] Generate error:', err);
                showToast('生成邀请码失败');
                btn.disabled = false;
                btn.innerHTML = '<span>🎫</span><span>生成邀请码</span>';
            }
        }
        
        // 生成随机邀请码
        function generateRandomCode(length) {
            var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            var code = '';
            for (var i = 0; i < length; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }
        
        // 保存邀请码到 localStorage（兼容方案）
        function saveInviteCodeToLocal(code, houseId) {
            // 获取当前房子名称
            var houseName = '家庭共享房子';
            var currentHouse = houses.find(function(h) { return h.id === houseId; });
            if (currentHouse && currentHouse.name) {
                houseName = currentHouse.name;
            }
            
            var codes = JSON.parse(localStorage.getItem('guoqiLeMe_inviteCodes') || '{}');
            codes[code] = {
                houseId: houseId,
                houseName: houseName,
                createdBy: currentUser.id,
                expiresAt: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString()
            };
            localStorage.setItem('guoqiLeMe_inviteCodes', JSON.stringify(codes));
            console.log('[Invite] saveInviteCodeToLocal 保存邀请码:', code, '房子:', houseName);
        }
        
        // 复制邀请码
        function copyInviteCode() {
            var code = document.getElementById('inviteCodeInput').value;
            if (!code) return;
            
            try {
                navigator.clipboard.writeText(code).then(function() {
                    showToast('邀请码已复制');
                }).catch(function() {
                    // fallback
                    var textarea = document.createElement('textarea');
                    textarea.value = code;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast('邀请码已复制');
                });
            } catch (e) {
                showToast('复制失败');
            }
        }

                    statusText: err.statusText
                });
                
                resultEl.className = 'join-result error show';
                // 根据错误类型显示更友好的消息
                var errorMsg = '加入失败，请重试';
                
                if (err.code === '23503') {
                    // 外键约束违反 - houses 表中缺少记录
                    errorMsg = '房子不存在（外键约束失败），请确认邀请码有效';
                    console.error('[Join] 诊断: houses 表中缺少 house_id=' + houseId + ' 的记录');
                    console.error('[Join] 解决方案: 需要在 houses 表中创建对应记录');
                } else if (err.code === '23505') {
                    errorMsg = '您已经是这个房子的成员';
                } else if (err.code === 'PGRST204') {
                    // PostgREST 错误 - RLS 阻止读取
                    errorMsg = '无法验证邀请码，请稍后重试（RLS限制）';
                    console.error('[Join] 诊断: RLS 策略阻止了 invite_codes 表的读取');
                } else if (err.status === 406 || err.statusText === 'Not Acceptable') {
                    errorMsg = '无法验证邀请码，请稍后重试';
                } else if (err.status === 401 || err.statusText === 'Unauthorized') {
                    errorMsg = '未授权，请重新登录';
                } else if (err.status === 403 || err.statusText === 'Forbidden') {
                    errorMsg = '权限不足，无法加入房子';
                }
                
                console.error('[Join] 最终错误信息:', errorMsg);
                resultEl.textContent = errorMsg;
            }
        }

        // 处理登录/注册提交
        async function handleAuthSubmit() {
            var email = document.getElementById('authEmail').value.trim();
            var password = document.getElementById('authPassword').value;
            var errorEl = document.getElementById('authError');
            var submitBtn = document.getElementById('authSubmitBtn');
            
            if (!email || !password) {
                errorEl.textContent = '请输入邮箱和密码';
                errorEl.classList.add('show');
                return;
            }
            
            if (password.length < 6) {
                errorEl.textContent = '密码至少需要6位';
                errorEl.classList.add('show');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = isRegisterMode ? '注册中...' : '登录中...';
            
            try {
                if (isRegisterMode) {
                    var signUpResult = await supabaseClient.auth.signUp({
                        email: email,
                        password: password
                    });
                    
                    if (signUpResult.error) {
                        throw signUpResult.error;
                    }
                    
                    showToast('注册成功！请查收验证邮件');
                    closeAuthModal();
                } else {
                    var signInResult = await supabaseClient.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    
                    if (signInResult.error) {
                        throw signInResult.error;
                    }
                    
                    showToast('登录成功');
                    closeAuthModal();
                }
            } catch (err) {
                console.error('[Auth] Error:', err);
                errorEl.textContent = err.message || '操作失败，请重试';
                errorEl.classList.add('show');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isRegisterMode ? '注册' : '登录';
            }
        }

        // 房子管理
        async function loadHouses() {
            if (!currentUser) return;
            
            try {
                // 获取用户创建的房子的 ID 列表
                var ownedHouses = [];
                var result = await supabaseClient
                    .from('houses')
                    .select('*')
                    .eq('owner_id', currentUser.id)
                    .order('created_at', { ascending: true });
                
                if (result.error) throw result.error;
                ownedHouses = result.data || [];
                console.log('[House] Owned houses:', ownedHouses.length);
                
                // 获取用户作为成员的房子
                var memberHouses = [];
                var memberResult = await supabaseClient
                    .from('house_members')
                    .select('house_id')
                    .eq('user_id', currentUser.id);
                
                if (!memberResult.error && memberResult.data && memberResult.data.length > 0) {
                    var memberHouseIds = memberResult.data.map(function(m) { return m.house_id; });
                    
                    // 查询这些房子的详情
                    var memberHouseResult = await supabaseClient
                        .from('houses')
                        .select('*')
                        .in('id', memberHouseIds);
                    
                    if (!memberHouseResult.error && memberHouseResult.data) {
                        memberHouses = memberHouseResult.data;
                    }
                }
                console.log('[House] Member houses:', memberHouses.length);
                
                // 合并房子列表（去重）
                var allHousesMap = {};
                for (var i = 0; i < ownedHouses.length; i++) {
                    allHousesMap[ownedHouses[i].id] = ownedHouses[i];
                }
                for (var j = 0; j < memberHouses.length; j++) {
                    if (!allHousesMap[memberHouses[j].id]) {
                        allHousesMap[memberHouses[j].id] = memberHouses[j];
                    }
                }
                
                houses = Object.values(allHousesMap);
                console.log('[House] Total houses:', houses.length);
                
                // 如果没有房子，创建默认房子
                if (houses.length === 0) {
                    await createDefaultHouse();
                } else {
                    // 使用上次选中的房子或第一个
                    var savedHouseId = localStorage.getItem('guoqiLeMe_currentHouseId');
                    if (savedHouseId && houses.some(function(h) { return h.id === savedHouseId; })) {
                        currentHouseId = savedHouseId;
                    } else {
                        currentHouseId = houses[0].id;
                    }
                }
            } catch (err) {
                console.error('[House] Load error:', err);
            }
        }

        // 数据同步
        async function syncLocalToCloud() {
            if (!currentUser || !currentHouseId) return;
            
            try {
                // 获取云端数据
                var cloudResult = await supabaseClient
                    .from('items')
                    .select('*')
                    .eq('house_id', currentHouseId);
                
                if (cloudResult.error) throw cloudResult.error;
                
                var cloudItems = cloudResult.data || [];
                
                // 合并数据：以云端数据为准，如果有冲突则保留云端
                // 如果本地有新数据但云端没有，同步到云端
                // 只处理属于当前房子的物品
                for (var i = 0; i < items.length; i++) {
                    var localItem = items[i];
                    // 跳过不属于当前房子的物品
                    if (localItem.house_id && localItem.house_id !== currentHouseId) continue;
                    
                    var existsInCloud = false;
                    
                    for (var j = 0; j < cloudItems.length; j++) {
                        if (cloudItems[j].local_id === localItem.id) {
                            existsInCloud = true;
                            break;
                        }
                    }
                    
                    if (!existsInCloud) {
                        // 同步新数据到云端
                        await supabaseClient.from('items').insert({
                            house_id: currentHouseId,
                            local_id: localItem.id,
                            name: localItem.name,
                            type: localItem.type,
                            category: localItem.category,
                            reminder_days: localItem.reminderDays,
                            location: localItem.location,
                            image: localItem.image,
                            pieces: JSON.stringify(localItem.pieces),
                            created_at: localItem.createdAt,
                            updated_at: localItem.updatedAt
                        });
                    }
                }
                
                console.log('[Sync] Local to cloud sync complete');
            } catch (err) {
                console.error('[Sync] Error:', err);
            }
        }
        
        async function syncFromCloud() {
            if (!currentUser || !currentHouseId) return;
            
            try {
                var result = await supabaseClient
                    .from('items')
                    .select('*')
                    .eq('house_id', currentHouseId);
                
                if (result.error) throw result.error;
                
                var cloudItems = result.data || [];
                
                // 将云端数据转换为本地格式
                var cloudData = cloudItems.map(function(cloudItem) {
                    return {
                        id: cloudItem.local_id,
                        house_id: cloudItem.house_id,
                        name: cloudItem.name,
                        type: cloudItem.type,
                        category: cloudItem.category,
                        reminderDays: cloudItem.reminder_days,
                        location: cloudItem.location,
                        image: cloudItem.image,
                        pieces: typeof cloudItem.pieces === 'string' ? JSON.parse(cloudItem.pieces) : cloudItem.pieces,
                        createdAt: cloudItem.created_at,
                        updatedAt: cloudItem.updated_at
                    };
                });
                
                // 合并到本地 items
                var localIds = items.map(function(item) { return item.id; });
                
                for (var i = 0; i < cloudData.length; i++) {
                    if (localIds.indexOf(cloudData[i].id) === -1) {
                        items.push(cloudData[i]);
                    }
                }
                
                // 保存到本地
                saveItems();
                renderItems();
                console.log('[Sync] Cloud to local sync complete, items:', items.length);
            } catch (err) {
                console.error('[Sync] Error:', err);
            }
        }

        // 防抖同步

        function debouncedSyncToCloud() {
            if (syncTimer) clearTimeout(syncTimer);
            syncTimer = setTimeout(syncItemToCloud, 1000);
        }
        
        async function syncItemToCloud() {
            if (!currentUser || !currentHouseId) return;
            
            try {
                // 删除云端中不存在的项
                var cloudResult = await supabaseClient
                    .from('items')
                    .select('local_id')
                    .eq('house_id', currentHouseId);
                
                if (!cloudResult.error && cloudResult.data) {
                    var cloudIds = cloudResult.data.map(function(item) { return item.local_id; });
                    
                    for (var i = 0; i < items.length; i++) {
                        var item = items[i];
                        // 跳过不属于当前房子的物品
                        if (item.house_id && item.house_id !== currentHouseId) continue;
                        
                        if (cloudIds.indexOf(item.id) === -1) {
                            // 新增到云端
                            await supabaseClient.from('items').insert({
                                house_id: currentHouseId,
                                local_id: item.id,
                                name: item.name,
                                type: item.type,
                                category: item.category,
                                reminder_days: item.reminderDays,
                                location: item.location,
                                image: item.image,
                                pieces: JSON.stringify(item.pieces),
                                created_at: item.createdAt,
                                updated_at: item.updatedAt
                            });
                        } else {
                            // 更新云端
                            await supabaseClient
                                .from('items')
                                .update({
                                    name: item.name,
                                    type: item.type,
                                    category: item.category,
                                    reminder_days: item.reminderDays,
                                    location: item.location,
                                    image: item.image,
                                    pieces: JSON.stringify(item.pieces),
                                    updated_at: item.updatedAt
                                })
                                .eq('house_id', currentHouseId)
                                .eq('local_id', item.id);
                        }
                    }
                    
                    // 删除云端有但本地没有的
                    for (var j = 0; j < cloudResult.data.length; j++) {
                        var cloudId = cloudResult.data[j].local_id;
                        var exists = false;
                        for (var k = 0; k < items.length; k++) {
                            var localItem = items[k];
                            // 只检查属于当前房子的物品
                            if (localItem.id === cloudId && (!localItem.house_id || localItem.house_id === currentHouseId)) {
                                exists = true;
                                break;
                            }
                        }
                        if (!exists) {
                            await supabaseClient
                                .from('items')
                                .delete()
                                .eq('house_id', currentHouseId)
                                .eq('local_id', cloudId);
                        }
                    }
                }
                
                console.log('[Sync] Item sync complete');
            } catch (err) {
                console.error('[Sync] Item sync error:', err);
            }
        }

        // 初始化语音识别
        function initSpeechRecognition() {
            if (!SpeechRecognition) {
                console.log('[Voice] SpeechRecognition not supported');
                return false;
            }
            
            try {
                recognition = new SpeechRecognition();
            } catch (e) {
                console.log('[Voice] Failed to create SpeechRecognition:', e);
                return false;
            }
            
            recognition.lang = 'zh-CN';
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;
            
            recognition.onstart = function() {
                console.log('[Voice] Recognition started');
                isRecording = true;
                updateVoiceButton();
                document.getElementById('voiceStatus').classList.add('show');
                document.getElementById('voiceStatusText').textContent = '正在听...请说话';
                document.getElementById('parseResult').classList.remove('show');
            };
            
            recognition.onresult = function(event) {
                var result = '';
                for (var i = event.resultIndex; i < event.results.length; i++) {
                    result += event.results[i][0].transcript;
                }
                interimTranscript = result;
                document.getElementById('voiceStatusText').textContent = result || '正在听...请说话';
                
                // 如果是最终结果
                if (event.results[event.results.length - 1].isFinal) {
                    console.log('[Voice] Final result:', result);
                    processVoiceResult(result);
                }
            };
            
            recognition.onerror = function(event) {
                console.log('[Voice] Recognition error:', event.error);
                isRecording = false;
                updateVoiceButton();
                document.getElementById('voiceStatus').classList.remove('show');
                
                switch (event.error) {
                    case 'not-allowed':
                    case 'permission-denied':
                        showToast('请允许麦克风权限后重试');
                        break;
                    case 'no-speech':
                        showToast('未检测到语音，请重试');
                        break;
                    case 'network':
                        showToast('网络错误，请检查网络连接');
                        break;
                    case 'audio-capture':
                        showToast('未检测到麦克风设备');
                        break;
                    case 'aborted':
                        // 用户主动停止，不提示
                        break;
                    default:
                        showToast('语音识别出错，请重试');
                }
            };
            
            recognition.onend = function() {
                console.log('[Voice] Recognition ended');
                isRecording = false;
                updateVoiceButton();
                document.getElementById('voiceStatus').classList.remove('show');
            };
            
            return true;
        }
        
        // 更新语音按钮状态
        function updateVoiceButton() {
            var btn = document.getElementById('voiceBtn');
            if (!btn) return;
            
            if (isRecording) {
                btn.classList.add('recording');
                btn.textContent = '⏹';
            } else {
                btn.classList.remove('recording');
                btn.textContent = '🎤';
            }
        }
        
        // 切换语音输入
        function toggleVoiceInput() {
            console.log('[Voice] toggleVoiceInput called, isRecording:', isRecording);
            
            // 首次点击时先检查支持情况
            if (!voiceSupported) {
                if (!checkVoiceSupport()) {
                    showToast('您的浏览器不支持语音输入');
                    return;
                }
            }
            
            if (isRecording) {
                // 停止录音
                console.log('[Voice] Stopping recognition');
                if (recognition) {
                    recognition.stop();
                }
            } else {
                // 开始录音
                console.log('[Voice] Starting recognition');
                
                // 先尝试获取麦克风权限
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    console.log('[Voice] Requesting microphone permission');
                    navigator.mediaDevices.getUserMedia({ audio: true })
                        .then(function(stream) {
                            console.log('[Voice] Microphone permission granted');
                            // 停止stream，因为 SpeechRecognition 会重新获取
                            stream.getTracks().forEach(function(track) {
                                track.stop();
                            });
                            startRecognition();
                        })
                        .catch(function(err) {
                            console.log('[Voice] Microphone permission denied:', err);
                            showToast('请允许麦克风权限');
                        });
                } else {
                    startRecognition();
                }
            }
        }
        
        // 开始语音识别
        function startRecognition() {
            if (!recognition) {
                var initResult = initSpeechRecognition();
                if (!initResult) {
                    showToast('语音识别初始化失败');
                    return;
                }
            }
            
            interimTranscript = '';
            
            try {
                console.log('[Voice] Calling recognition.start()');
                recognition.start();
            } catch (e) {
                console.log('[Voice] Start error:', e);
                // 可能已经在运行，先停止再重启
                try {
                    recognition.stop();
                    setTimeout(function() {
                        try {
                            recognition.start();
                        } catch (e2) {
                            console.log('[Voice] Retry start failed:', e2);
                            showToast('语音识别启动失败');
                        }
                    }, 100);
                } catch (e2) {
                    console.log('[Voice] Stop also failed:', e2);
                    recognition = null;
                    initSpeechRecognition();
                    try {
                        recognition.start();
                    } catch (e3) {
                        console.log('[Voice] Final start failed:', e3);
                        showToast('语音识别启动失败');
                    }
                }
            }
        }
        
        // 处理语音识别结果
        function processVoiceResult(text) {
            if (!text || text.trim() === '') {
                showToast('未识别到内容');
                return;
            }
            
            var parsed = parseVoiceInput(text);
            applyParsedResult(parsed);
            
            // 显示解析结果
            var parseResult = document.getElementById('parseResult');
            var parseResultText = document.getElementById('parseResultText');
            var parsedInfo = document.getElementById('parsedInfo');
            
            parseResultText.textContent = '已识别：' + text;
            
            var infoHtml = '';
            if (parsed.name) {
                infoHtml += '<span class="parsed-item">名称：' + parsed.name + '</span>';
            }
            if (parsed.days) {
                infoHtml += '<span class="parsed-item">有效期：' + parsed.days + '天</span>';
            }
            if (parsed.reminderDays) {
                infoHtml += '<span class="parsed-item">提醒：倒数' + parsed.reminderDays + '天</span>';
            }
            if (parsed.location) {
                infoHtml += '<span class="parsed-item">位置：' + parsed.location + '</span>';
            }
            
            parsedInfo.innerHTML = infoHtml || '<span style="color:#9ca3af;">请手动填写其他信息</span>';
            parseResult.classList.add('show');
            
            showToast('语音识别完成');
        }
        
        // 解析语音输入
        function parseVoiceInput(text) {
            var result = {
                name: '',
                days: 0,
                reminderDays: 0,
                location: '',
                category: ''
            };
            
            // 移除句末标点
            text = text.replace(/[。！？，、；：""''【】（)（）]/g, ' ').trim();
            
            // 时间词到天数的映射
            var timeMap = {
                '秒': 0.00001157,
                '分钟': 0.000694,
                '半小时': 0.5,
                '一刻钟': 0.25,
                '小时': 0.0417,
                '时辰': 2,
                '天': 1,
                '日': 1,
                '周': 7,
                '星期': 7,
                '礼拜': 7,
                '个月': 30,
                '月': 30,
                '季度': 90,
                '季度': 90,
                '季': 90,
                '半年': 180,
                '学期': 120,
                '学期': 120,
                '年': 365,
                '周岁': 365
            };
            
            // 数字映射
            var numMap = {
                '零': 0, '一': 1, '二': 2, '两': 2, '三': 3, '四': 4, '五': 5,
                '六': 6, '七': 7, '八': 8, '九': 9, '十': 10, '百': 100,
                '半': 0.5, '几个': 3, '若干': 5, '几天': 3
            };
            
            // 解析阿拉伯数字
            var arabicNum = text.match(/(\d+(?:\.\d+)?)/);
            if (arabicNum) {
                var num = parseFloat(arabicNum[1]);
                // 检查后面是否有时间单位
                var afterNum = text.substring(arabicNum.index + arabicNum[0].length);
                
                for (var unit in timeMap) {
                    if (afterNum.indexOf(unit) !== -1) {
                        var days = Math.round(num * timeMap[unit]);
                        if (days > 0 && days < 1000) {
                            result.days = days;
                            break;
                        }
                    }
                }
            }
            
            // 解析中文数字
            for (var cn in numMap) {
                if (text.indexOf(cn) !== -1) {
                    var afterCn = text.substring(text.indexOf(cn) + cn.length);
                    for (var unit in timeMap) {
                        if (afterCn.indexOf(unit) !== -1) {
                            var days = Math.round(numMap[cn] * timeMap[unit]);
                            if (days > 0 && days < 1000 && days > result.days) {
                                result.days = days;
                                break;
                            }
                        }
                    }
                }
            }
            
            // 特殊表达处理
            if (text.indexOf('尽快') !== -1 || text.indexOf('尽快用') !== -1 || text.indexOf('尽快吃') !== -1) {
                result.days = 3;
            }
            if (text.indexOf('尽快喝') !== -1) {
                result.days = 1;
            }
            if (text.indexOf('别过期') !== -1 || text.indexOf('别坏') !== -1) {
                result.days = 7;
            }
            
            // 提取物品名称
            var namePatterns = [
                /^(.+?)(?:，|,|。|有效期|保质期|放到|放于|放在|放到|有效|保质|提醒|天|个月|周|过期)/,
                /^(?:这是|买了|买|有|放|放个?|新增)(?:个|件|箱|瓶|袋|盒)?(.+?)(?:，|,|。|$)/,
                /^(.+?)(?:吧|呀|哦|呢|啊)/
            ];
            
            for (var i = 0; i < namePatterns.length; i++) {
                var match = text.match(namePatterns[i]);
                if (match && match[1]) {
                    var potentialName = match[1].trim();
                    // 过滤掉明显的描述词
                    if (potentialName.length >= 2 && 
                        potentialName !== '个' && 
                        potentialName !== '件' &&
                        potentialName !== '箱' &&
                        !potentialName.match(/^\d/) &&
                        potentialName.indexOf('有效期') === -1 &&
                        potentialName.indexOf('保质期') === -1 &&
                        potentialName.indexOf('提醒') === -1) {
                        result.name = potentialName;
                        break;
                    }
                }
            }
            
            // 如果没匹配到，尝试取最前面的名词
            if (!result.name) {
                var nameKws = ['牛奶', '酸奶', '鸡蛋', '面包', '水果', '蔬菜', '肉', '鱼', '虾', '蛋糕', '饮料',
                             '水', '茶', '咖啡', '零食', '饼干', '蛋糕', '巧克力', '糖果', '薯片',
                             '洗发水', '沐浴露', '洗面奶', '面霜', '乳液', '口红', '面膜',
                             '牙刷', '牙膏', '纸巾', '湿巾', '洗衣液', '洗洁精',
                             '油', '盐', '酱', '醋', '酱油', '蚝油'];
                for (var j = 0; j < nameKws.length; j++) {
                    if (text.indexOf(nameKws[j]) !== -1) {
                        result.name = nameKws[j];
                        break;
                    }
                }
            }
            
            // 解析提醒时间 - 倒数第X天
            var reminderMatch = text.match(/(?:倒数|第|提前)(?:第)?(\d+)天?(?:提醒|通知我)/);
            if (reminderMatch) {
                result.reminderDays = parseInt(reminderMatch[1]);
            } else if (text.indexOf('提醒我') !== -1) {
                var remindNum = text.match(/提醒[我咱]?(\d+)天/);
                if (remindNum) {
                    result.reminderDays = parseInt(remindNum[1]);
                }
            }
            
            // 解析存放位置
            var locationPatterns = [
                /放[在于]?(.+?)(?:，|,|。|$|有效期|保质|提醒|过期|天内)/,
                /存[放在于]?(.+?)(?:，|,|。|$|有效期|保质|提醒|过期|天内)/
            ];
            
            for (var k = 0; k < locationPatterns.length; k++) {
                var locMatch = text.match(locationPatterns[k]);
                if (locMatch && locMatch[1]) {
                    var loc = locMatch[1].trim();
                    if (loc.length >= 1 && loc.length <= 10) {
                        result.location = loc;
                        break;
                    }
                }
            }
            
            // 常见位置识别
            var commonLocations = ['冰箱', '冷冻', '冷藏', '常温', '厨房', '客厅', '卧室', '卫生间', 
                                   '浴室', '柜子', '抽屉', '桌面', '阳台', '车里', '办公室'];
            for (var m = 0; m < commonLocations.length; m++) {
                if (text.indexOf(commonLocations[m]) !== -1) {
                    result.location = commonLocations[m];
                    break;
                }
            }
            
            // 根据物品名称推断分类
            var foodKeywords = ['牛奶', '酸奶', '鸡蛋', '面包', '水果', '蔬菜', '肉', '鱼', '虾', '蛋糕', 
                               '饮料', '水', '茶', '咖啡', '零食', '饼干', '薯片', '油', '盐', '酱', '醋',
                               '酱油', '蚝油', '米', '面', '饭', '菜', '汤', '果', '食'];
            for (var n = 0; n < foodKeywords.length; n++) {
                if (result.name.indexOf(foodKeywords[n]) !== -1) {
                    result.category = 'food';
                    break;
                }
            }
            
            return result;
        }
        
        // 应用解析结果到表单
        function applyParsedResult(parsed) {
            if (parsed.name) {
                document.getElementById('itemName').value = parsed.name;
            }
            
            if (parsed.days > 0) {
                document.getElementById('validDays').value = parsed.days;
                autoCalculateExpireDate();
            }
            
            if (parsed.reminderDays > 0) {
                document.getElementById('reminderDays').value = parsed.reminderDays;
            }
            
            if (parsed.location) {
                document.getElementById('itemLocation').value = parsed.location;
            }
            
            if (parsed.category) {
                document.getElementById('itemType').value = parsed.category;
                onTypeChange();
                
                // 尝试匹配具体分类
                var cats = categories[parsed.category] || [];
                for (var i = 0; i < cats.length; i++) {
                    if (parsed.name.indexOf(cats[i]) !== -1) {
                        document.getElementById('itemCategory').value = cats[i];
                        onCategoryChange();
                        break;
                    }
                }
            }
        }

        function autoCalculateExpireDate() {
            var purchaseDate = document.getElementById('purchaseDate').value;
            var validDays = parseInt(document.getElementById('validDays').value) || 0;
            
            if (purchaseDate && validDays > 0) {
                var expire = new Date(purchaseDate);
                expire.setDate(expire.getDate() + validDays);
                var yyyy = expire.getFullYear();
                var mm = String(expire.getMonth() + 1).padStart(2, '0');
                var dd = String(expire.getDate()).padStart(2, '0');
                document.getElementById('expireDate').value = yyyy + '-' + mm + '-' + dd;
            }
        }
        
        function onExpireDateChange() {
            var purchaseDate = document.getElementById('purchaseDate').value;
            var expireDate = document.getElementById('expireDate').value;
            
            if (purchaseDate && expireDate) {
                var start = new Date(purchaseDate);
                var end = new Date(expireDate);
                var days = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
                if (days >= 0) {
                    document.getElementById('validDays').value = days;
                }
            }
        }
        
        function getDaysLeft(expireDate) {
            var today = new Date();
            today.setHours(0, 0, 0, 0);
            var expire = new Date(expireDate);
            expire.setHours(0, 0, 0, 0);
            return Math.ceil((expire - today) / (1000 * 60 * 60 * 24));
        }
        
        function getItemUrgency(item) {
            if (!item.pieces || item.pieces.length === 0) {
                return { level: 'safe', class: 'safe', urgent: false, status: '安全' };
            }
            
            var hasExpired = false; // 已过期
            var hasDanger = false;   // 紧急（生鲜3天内）
            var hasWarning = false;  // 即将过期
            
            // 根据物品分类获取对应的预警天数
            var warningDays = getWarningDaysByCategory(item.category);
            var isFresh = isFreshFood(item.category);
            
            for (var i = 0; i < item.pieces.length; i++) {
                var piece = item.pieces[i];
                var daysLeft = getDaysLeft(piece.expireDate);
                
                if (daysLeft < 0) {
                    hasExpired = true;
                } else if (isFresh && daysLeft <= 3) {
                    // 生鲜类：3天内为紧急
                    hasDanger = true;
                } else if (daysLeft <= warningDays) {
                    hasWarning = true;
                }
            }
            
            if (hasExpired) {
                return { level: 'danger', class: 'danger-expired', urgent: true, status: '已过期' };
            } else if (hasDanger) {
                return { level: 'danger', class: 'danger-critical', urgent: true, status: '紧急' };
            } else if (hasWarning) {
                return { level: 'warning', class: 'warning', urgent: false, status: '即将过期' };
            }
            return { level: 'safe', class: 'safe', urgent: false, status: '安全' };
        }
        
        // 获取物品中最近过期天数
        function getMinDaysLeft(item) {
            if (!item.pieces || item.pieces.length === 0) return Infinity;
            var minDays = Infinity;
            for (var i = 0; i < item.pieces.length; i++) {
                var days = getDaysLeft(item.pieces[i].expireDate);
                if (days < minDays) minDays = days;
            }
            return minDays;
        }
        
        // 判断是否为生鲜即将过期（生鲜在预警天数内但未过期）
        function isFreshWarning(item) {
            if (!item.pieces || item.pieces.length === 0) return false;
            if (!isFreshFood(item.category)) return false;
            
            var warningDays = getWarningDaysByCategory(item.category);
            for (var i = 0; i < item.pieces.length; i++) {
                var daysLeft = getDaysLeft(item.pieces[i].expireDate);
                if (daysLeft >= 0 && daysLeft <= warningDays) {
                    return true;
                }
            }
            return false;
        }
        
        function getItemSummary(item) {
            if (!item.pieces || item.pieces.length === 0) return '共0件';
            
            var total = item.pieces.length;
            var warningDays = getWarningDaysByCategory(item.category);
            var isFresh = isFreshFood(item.category);
            var urgentCount = 0;
            
            for (var i = 0; i < item.pieces.length; i++) {
                var daysLeft = getDaysLeft(item.pieces[i].expireDate);
                if (daysLeft < 0) {
                    urgentCount++;
                } else if (isFresh && daysLeft <= 3) {
                    urgentCount++;
                } else if (daysLeft <= warningDays) {
                    urgentCount++;
                }
            }
            
            if (urgentCount > 0) {
                return '共' + total + '件，<span class="warn">' + urgentCount + '件需处理</span>';
            }
            return '共' + total + '件';
        }
        
        function getPieceStatus(piece, item) {
            var daysLeft = getDaysLeft(piece.expireDate);
            var warningDays = item ? getWarningDaysByCategory(item.category) : 7;
            var isFresh = item ? isFreshFood(item.category) : false;
            
            if (daysLeft < 0) {
                return { class: 'danger', text: '已过期' + Math.abs(daysLeft) + '天' };
            } else if (isFresh && daysLeft <= 3) {
                // 生鲜3天内为紧急
                return { class: 'danger', text: '剩余' + daysLeft + '天' };
            } else if (daysLeft <= warningDays) {
                return { class: 'warning', text: '剩余' + daysLeft + '天' };
            }
            return { class: 'safe', text: '剩余' + daysLeft + '天' };
        }
        
        function renderItems() {
            var filtered = [];
            
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                // 关键：只显示当前房子的物品
                if (currentHouseId && item.house_id !== currentHouseId) continue;
                if (typeFilter !== 'all' && item.type !== typeFilter) continue;
                if (statusFilter === 'all') {
                    filtered.push(item);
                } else if (statusFilter === 'danger-fresh') {
                    // 生鲜即将过期筛选
                    if (isFreshWarning(item)) {
                        filtered.push(item);
                    }
                } else {
                    var urgency = getItemUrgency(item);
                    if (urgency.level === statusFilter) {
                        filtered.push(item);
                    }
                }
            }
            
            // 智能排序：已过期 > 即将过期（按剩余天数升序） > 正常（按过期日期升序）
            filtered.sort(function(a, b) {
                var urgencyA = getItemUrgency(a);
                var urgencyB = getItemUrgency(b);
                var minDaysA = getMinDaysLeft(a);
                var minDaysB = getMinDaysLeft(b);
                
                // 已过期排在最前面（按过期天数降序，即越早过期越靠前）
                if (minDaysA < 0 && minDaysB < 0) {
                    return minDaysA - minDaysB; // 都是负数，越小的越紧急
                }
                if (minDaysA < 0) return -1; // A已过期，B未过期
                if (minDaysB < 0) return 1;  // B已过期，A未过期
                
                // 即将过期（按剩余天数升序）
                var warningA = urgencyA.level === 'warning';
                var warningB = urgencyB.level === 'warning';
                if (warningA && warningB) {
                    return minDaysA - minDaysB; // 都是即将过期，按天数升序
                }
                if (warningA) return -1; // A即将过期，B正常
                if (warningB) return 1;  // B即将过期，A正常
                
                // 都是正常物品，按过期日期升序
                return minDaysA - minDaysB;
            });
            
            updateStats();
            
            var listEl = document.getElementById('itemList');
            
            if (filtered.length === 0) {
                listEl.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>暂无物品</p><p style="font-size:0.85rem;margin-top:6px;color:#9ca3af;">点击上方"添加物品"开始记录</p></div>';
                return;
            }
            
            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                var item = filtered[i];
                var urgency = getItemUrgency(item);
                var summary = getItemSummary(item);
                var typeIcon = item.type === 'food' ? '🍎' : (item.type === 'skincare' ? '💄' : '🧴');
                
                var imgHtml = '';
                if (item.image) {
                    imgHtml = '<img src="' + item.image + '" class="card-thumb" alt="物品" onclick="showImagePreview(\'' + item.image + '\')">';
                } else {
                    imgHtml = '<div class="card-thumb" style="display:flex;align-items:center;justify-content:center;font-size:1.4rem;background:#f5f5f5;">' + typeIcon + '</div>';
                }
                
                var piecesHtml = '';
                if (item.pieces && item.pieces.length > 0) {
                    for (var j = 0; j < item.pieces.length; j++) {
                        var piece = item.pieces[j];
                        var status = getPieceStatus(piece, item);
                        piecesHtml += '<div class="piece-item">' +
                            '<div class="piece-info">' + (piece.purchaseDate ? '购于' + piece.purchaseDate : '') + ' → ' + piece.expireDate + '</div>' +
                            '<div class="piece-days ' + status.class + '">' + status.text + '</div>' +
                            '<div class="piece-actions">' +
                            '<button class="edit-btn" onclick="event.stopPropagation();editPiece(\'' + item.id + '\',' + j + ')">✏️</button>' +
                            '<button class="delete-btn" onclick="event.stopPropagation();deletePiece(\'' + item.id + '\',' + j + ')">🗑️</button>' +
                            '</div></div>';
                    }
                }
                
                // 构建卡片附加信息（购买日期、存放位置）
                var cardExtraInfo = '';
                var firstPiece = item.pieces && item.pieces.length > 0 ? item.pieces[0] : null;
                if (firstPiece && firstPiece.purchaseDate) {
                    cardExtraInfo += '<span>购买：' + firstPiece.purchaseDate + '</span>';
                }
                if (item.location) {
                    if (cardExtraInfo) cardExtraInfo += ' · ';
                    cardExtraInfo += '<span>📍' + escapeHtml(item.location) + '</span>';
                }
                var extraInfoHtml = cardExtraInfo ? '<div class="card-extra-info">' + cardExtraInfo + '</div>' : '';
                
                html += '<div class="item-card ' + urgency.class + '" onclick="toggleDetail(this)" oncontextmenu="showContextMenu(event, \'' + item.id + '\'); return false;">' +
                    '<div class="card-main">' +
                    imgHtml +
                    '<div class="card-content">' +
                    '<div class="card-name">' + escapeHtml(item.name) + '</div>' +
                    '<div class="card-category">' + typeIcon + ' ' + escapeHtml(item.category) + '</div>' +
                    extraInfoHtml +
                    '<div class="card-summary">' + summary + '</div>' +
                    '<div class="card-status ' + urgency.level + '">' + urgency.status + '</div>' +
                    '</div>' +
                    '<div class="card-actions">' +
                    '<button class="edit-btn" onclick="event.stopPropagation();editItem(\'' + item.id + '\')">✏️</button>' +
                    '<button class="delete-btn" onclick="event.stopPropagation();deleteItem(\'' + item.id + '\')">🗑️</button>' +
                    '</div></div>' +
                    '<div class="card-detail">' +
                    piecesHtml +
                    '<button class="add-piece-btn" onclick="event.stopPropagation();openAddPieceModal(\'' + item.id + '\')">➕ 添加一件</button>' +
                    '</div></div>';
            }
            
            listEl.innerHTML = html;
            
            // 绑定长按事件
            bindLongPressEvents();
        }

        function updateStats() {
            var danger = 0, warning = 0, safe = 0, dangerFresh = 0;
            
            // 统计当前房子的物品
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                // 只统计属于当前房子的物品
                if (currentHouseId && item.house_id !== currentHouseId) continue;
                
                var urgency = getItemUrgency(item);
                if (urgency.level === 'danger') danger++;
                else if (urgency.level === 'warning') {
                    warning++;
                    // 同时统计生鲜即将过期
                    if (isFreshWarning(item)) {
                        dangerFresh++;
                    }
                }
                else safe++;
            }
            
            // 计算当前房子的物品总数
            var currentHouseItemCount = 0;
            for (var i = 0; i < items.length; i++) {
                if (!items[i].house_id || items[i].house_id === currentHouseId) {
                    currentHouseItemCount++;
                }
            }
            
            document.getElementById('dangerCount').textContent = danger;
            document.getElementById('warningCount').textContent = warning;
            document.getElementById('safeCount').textContent = safe;
            document.getElementById('dangerFreshCount').textContent = dangerFresh;
            document.getElementById('allCount').textContent = currentHouseItemCount;
            document.getElementById('typeAllCount').textContent = currentHouseItemCount;
            
            var foodCount = 0, dailyCount = 0, skincareCount = 0;
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                // 只统计属于当前房子的物品
                if (currentHouseId && item.house_id !== currentHouseId) continue;
                
                if (item.type === 'food') foodCount++;
                else if (item.type === 'daily') dailyCount++;
                else if (item.type === 'skincare') skincareCount++;
            }
            document.getElementById('foodCount').textContent = foodCount;
            document.getElementById('dailyCount').textContent = dailyCount;
            document.getElementById('skincareCount').textContent = skincareCount;
        }
        
        function checkUrgentItems() {
            var urgentItems = [];
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                // 只检查属于当前房子的物品
                if (currentHouseId && item.house_id !== currentHouseId) continue;
                
                if (getItemUrgency(item).urgent) {
                    urgentItems.push(item);
                }
            }
            
            if (urgentItems.length > 0) {
                var item = urgentItems[0];
                var minDays = Infinity;
                for (var i = 0; i < item.pieces.length; i++) {
                    var days = getDaysLeft(item.pieces[i].expireDate);
                    if (days < minDays) minDays = days;
                }
                
                showAlert('⚠️ 紧急提醒', '<strong>' + item.name + '</strong>（' + item.category + '）<br>最紧急的件剩余 <strong style="color:#ef4444;font-size:1.1em;">' + minDays + '</strong> 天过期！');
            }
        }

        function validateBarcode(barcode) {
            return /^\d{8,14}$/.test(barcode);
        }
        
        // 根据分类标签智能判断分类
        function guessCategoryFromTags(categoriesTags) {
            if (!categoriesTags || !categoriesTags.length) return 'daily';
            
            var tagsStr = categoriesTags.join(' ').toLowerCase();
            
            // 护肤品/化妆品
            if (tagsStr.includes('cosmetics') || 
                tagsStr.includes('skin-care') || 
                tagsStr.includes('beauty') ||
                tagsStr.includes('make-up') ||
                tagsStr.includes('fragrance') ||
                tagsStr.includes('shampoo') ||
                tagsStr.includes('soap') ||
                tagsStr.includes('lotion')) {
                return 'skincare';
            }
            
            // 食品/饮料
            if (tagsStr.includes('beverages') || 
                tagsStr.includes('food') || 
                tagsStr.includes('dairy') ||
                tagsStr.includes('snack') ||
                tagsStr.includes('confectionery') ||
                tagsStr.includes('chocolate') ||
                tagsStr.includes('drink') ||
                tagsStr.includes('coffee') ||
                tagsStr.includes('tea') ||
                tagsStr.includes('sauce') ||
                tagsStr.includes('spreads') ||
                tagsStr.includes('cereal')) {
                return 'food';
            }
            
            // 默认日用品
            return 'daily';
        }

        // 查询条码（带防抖）
        function queryBarcode() {
            // 清除之前的定时器
            if (barcodeDebounceTimer) {
                clearTimeout(barcodeDebounceTimer);
            }
            
            var barcode = document.getElementById('barcodeInput').value.trim();
            
            // 验证格式
            if (!barcode) {
                showBarcodeResult('error', '请输入条码');
                return;
            }
            
            if (!validateBarcode(barcode)) {
                showBarcodeResult('error', '条码格式错误，应为8-14位数字');
                return;
            }
            
            // 显示加载状态
            var queryBtn = document.getElementById('barcodeQueryBtn');
            queryBtn.disabled = true;
            queryBtn.textContent = '查询中...';
            showBarcodeResult('loading', '正在查询商品信息...');
            
            // 调用 Open Food Facts API
            var apiUrl = 'https://world.openfoodfacts.org/api/v2/product/' + barcode + '.json';
            
            fetch(apiUrl)
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error('网络请求失败');
                    }
                    return response.json();
                })
                .then(function(data) {
                    // 重置按钮状态
                    queryBtn.disabled = false;
                    queryBtn.textContent = '查询';
                    
                    if (data.status === 1 && data.product) {
                        // 找到商品
                        var product = data.product;
                        var productName = product.product_name || product.product_name_en || '';
                        var brands = product.brands || '';
                        
                        // 自动填充表单
                        if (productName) {
                            document.getElementById('itemName').value = productName;
                        }
                        
                        // 品牌拼接到名称
                        if (brands && productName && !productName.toLowerCase().includes(brands.toLowerCase())) {
                            document.getElementById('itemName').value = brands + ' ' + productName;
                        }
                        
                        // 智能判断分类
                        var guessedType = guessCategoryFromTags(product.categories_tags);
                        document.getElementById('itemType').value = guessedType;
                        onTypeChange();
                        
                        // 自动选择第一个具体分类
                        var categories = getSpecificCategories(guessedType);
                        if (categories.length > 0) {
                            document.getElementById('itemCategory').value = categories[0].value;
                        }
                        
                        // 显示成功结果
                        var displayName = (brands ? brands + ' ' : '') + productName;
                        showBarcodeResult('success', '✓ 找到：' + displayName, {
                            name: productName,
                            brands: brands,
                            imageUrl: product.image_url || null
                        });
                    } else {
                        // 未找到商品
                        showBarcodeResult('error', '未找到该条码，请手动填写');
                    }
                })
                .catch(function(error) {
                    // 重置按钮状态
                    queryBtn.disabled = false;
                    queryBtn.textContent = '查询';
                    
                    console.error('Barcode API Error:', error);
                    showBarcodeResult('error', '网络错误，请稍后重试');
                });
        }
