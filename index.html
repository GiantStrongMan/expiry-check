        function saveItem() {
            var name = document.getElementById('itemName').value.trim();
            var type = document.getElementById('itemType').value;
            var category = document.getElementById('itemCategory').value;
            var purchaseDate = document.getElementById('purchaseDate').value;
            var validDays = parseInt(document.getElementById('validDays').value) || 0;
            var expireDate = document.getElementById('expireDate').value;
            var reminderDays = parseInt(document.getElementById('reminderDays').value) || 7;
            var location = document.getElementById('itemLocation').value.trim();
            
            var imagePreview = document.getElementById('imagePreview').innerHTML;
            var imgMatch = imagePreview.match(/src="([^"]+)"/);
            var image = imgMatch ? imgMatch[1] : null;
            
            if (!name || !type || !category || !expireDate) {
                showToast('请填写必填项');
                return;
            }
            
            var itemData = {
                id: editingId || 'item_' + Date.now(),
                house_id: currentHouseId, // 关联到当前房子
                name: name,
                type: type,
                category: category,
                reminderDays: reminderDays,
                location: location,
                image: image,
                updatedAt: new Date().toISOString()
            };
            
            if (editingId) {
                var existing = findItemById(editingId);
                if (existing) {
                    itemData.pieces = existing.pieces;
                    itemData.createdAt = existing.createdAt;
                    for (var i = 0; i < items.length; i++) {
                        if (items[i].id === editingId) {
                            items[i] = itemData;
                            break;
                        }
                    }
                }
                showToast('物品已更新');
            } else {
                var piece = {
                    id: 'piece_' + Date.now(),
                    purchaseDate: purchaseDate || new Date().toISOString().split('T')[0],
                    expireDate: expireDate,
                    validDays: validDays
                };
                itemData.pieces = [piece];
                itemData.createdAt = new Date().toISOString();
                items.push(itemData);
                showToast('添加成功');
            }
            
            saveItems();
            renderItems();
            closeModal();
        }
        
        function closeDuplicateModal() {
            document.getElementById('duplicateModal').classList.remove('show');
            pendingItem = null;
        }
        
        function confirmDuplicate() {
            if (pendingItem) {
                pendingItem.house_id = currentHouseId; // 关联到当前房子
                items.push(pendingItem);
                saveItems();
                renderItems();
                showToast('添加成功');
            }
            closeDuplicateModal();
            closeModal();
        }
        
        function editItem(id) { openModal(id); }
        
        // 删除确认相关变量
        var pendingDeleteItemId = null;
        var pendingDeletePieceIdx = null;
        var pendingDeleteItemIdForPiece = null;
        
        // 删除物品 - 显示确认弹窗
        function deleteItem(id) {
            var item = findItemById(id);
            if (!item) return;
            
            pendingDeleteItemId = id;
            pendingDeletePieceIdx = null;
            pendingDeleteItemIdForPiece = null;
            
            document.getElementById('confirmIcon').textContent = '🗑️';
            document.getElementById('confirmTitle').textContent = '确认删除';
            document.getElementById('confirmMessage').textContent = '确定删除「' + escapeHtml(item.name) + '」吗？';
            document.getElementById('confirmModal').classList.add('show');
        }
        
        // 删除单件 - 显示确认弹窗
        function deletePiece(itemId, pieceIdx) {
            var item = findItemById(itemId);
            if (!item) return;
            
            if (item.pieces.length <= 1) {
                // 最后一件，询问是否删除整个物品
                pendingDeleteItemId = itemId;
                pendingDeletePieceIdx = null;
                pendingDeleteItemIdForPiece = null;
                
                document.getElementById('confirmIcon').textContent = '⚠️';
                document.getElementById('confirmTitle').textContent = '最后一件';
                document.getElementById('confirmMessage').textContent = '这是「' + escapeHtml(item.name) + '」的最后一件，删除整件物品吗？';
                document.getElementById('confirmModal').classList.add('show');
                return;
            }
            
            // 删除单件
            pendingDeleteItemId = null;
            pendingDeletePieceIdx = pieceIdx;
            pendingDeleteItemIdForPiece = itemId;
            
            document.getElementById('confirmIcon').textContent = '🗑️';
            document.getElementById('confirmTitle').textContent = '确认删除';
            document.getElementById('confirmMessage').textContent = '确定删除这件吗？';
            document.getElementById('confirmModal').classList.add('show');
        }
        
        // 关闭确认弹窗
        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('show');
            pendingDeleteItemId = null;
            pendingDeletePieceIdx = null;
            pendingDeleteItemIdForPiece = null;
        }
        
        // 确认删除
        function confirmDelete() {
            if (pendingDeleteItemId) {
                // 删除整个物品
                for (var i = 0; i < items.length; i++) {
                    if (items[i].id === pendingDeleteItemId) {
                        items.splice(i, 1);
                        break;
                    }
                }
                saveItems();
                renderItems();
                showToast('已删除');
            } else if (pendingDeletePieceIdx !== null && pendingDeleteItemIdForPiece) {
                // 删除单件
                var item = findItemById(pendingDeleteItemIdForPiece);
                if (item && item.pieces[pendingDeletePieceIdx]) {
                    item.pieces.splice(pendingDeletePieceIdx, 1);
                    item.updatedAt = new Date().toISOString();
                    saveItems();
                    renderItems();
                    showToast('已删除');
                }
            }
            closeConfirmModal();
        }
        
        function openAddPieceModal(itemId) {
            var item = findItemById(itemId);
            if (!item) return;
            
            var purchaseDateStr = prompt('购买日期（留空为今天）：', new Date().toISOString().split('T')[0]);
            if (purchaseDateStr === null) return;
            
            if (!purchaseDateStr) {
                purchaseDateStr = new Date().toISOString().split('T')[0];
            }
            
            var suggestedDays = (suggestedExpiry[item.type] && suggestedExpiry[item.type][item.category]) ? suggestedExpiry[item.type][item.category] : 30;
            var validDaysStr = prompt('有效期天数：', suggestedDays);
            if (validDaysStr === null) return;
            
            var validDays = parseInt(validDaysStr);
            if (isNaN(validDays) || validDays <= 0) {
                showToast('请输入有效的天数');
                return;
            }
            
            var expireDate = new Date(purchaseDateStr);
            expireDate.setDate(expireDate.getDate() + validDays);
            
            item.pieces.push({
                id: 'piece_' + Date.now(),
                purchaseDate: purchaseDateStr,
                expireDate: expireDate.toISOString().split('T')[0],
                validDays: validDays
            });
            item.updatedAt = new Date().toISOString();
            
            saveItems();
            renderItems();
            showToast('已添加一件');
        }
        
        function editPiece(itemId, pieceIdx) {
            var item = findItemById(itemId);
            if (!item || !item.pieces[pieceIdx]) return;
            
            var piece = item.pieces[pieceIdx];
            var expireDateStr = prompt('过期日期：', piece.expireDate);
            if (expireDateStr === null) return;
            
            var purchaseDateStr = prompt('购买日期：', piece.purchaseDate);
            if (purchaseDateStr === null) return;
            
            var start = new Date(purchaseDateStr);
            var end = new Date(expireDateStr);
            var days = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
            
            item.pieces[pieceIdx] = {
                id: piece.id,
                purchaseDate: purchaseDateStr,
                expireDate: expireDateStr,
                validDays: days > 0 ? days : 0
            };
            item.updatedAt = new Date().toISOString();
            
            saveItems();
            renderItems();
            showToast('已更新');
        }
        
        function previewImage(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').innerHTML = '<img src="' + e.target.result + '" alt="预览">';
                    document.getElementById('uploadText').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        function showImagePreview(src) {
            document.getElementById('previewImage').src = src;
            document.getElementById('imgPreviewModal').classList.add('show');
        }
        
        function closeImagePreview() {
            document.getElementById('imgPreviewModal').classList.remove('show');
        }
        
        // 导出Excel
        function exportToExcel() {
            if (typeof window.XLSX === 'undefined') {
                showToast('Excel功能加载中，请稍后重试');
                return;
            }
            
            if (items.length === 0) {
                showToast('没有可导出的数据');
                return;
            }
            
            var data = [];
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                var urgency = getItemUrgency(item);
                for (var j = 0; j < item.pieces.length; j++) {
                    var piece = item.pieces[j];
                    var daysLeft = getDaysLeft(piece.expireDate);
                    data.push({
                        '物品名称': item.name,
                        '件数序号': j + 1,
                        '分类': item.type === 'food' ? '食物' : item.type === 'skincare' ? '护肤品' : '日用品',
                        '具体分类': item.category,
                        '购买日期': piece.purchaseDate,
                        '过期日期': piece.expireDate,
                        '剩余天数': daysLeft < 0 ? '已过期' + Math.abs(daysLeft) + '天' : '剩余' + daysLeft + '天',
                        '状态': urgency.status,
                        '临期提醒': item.reminderDays || 7,
                        '存放位置': item.location || ''
                    });
                }
            }
            
            var ws = window.XLSX.utils.json_to_sheet(data);
            var wb = window.XLSX.utils.book_new();
            window.XLSX.utils.book_append_sheet(wb, ws, '物品清单');
            
            var date = new Date().toISOString().slice(0, 10);
            window.XLSX.writeFile(wb, '过期了么_' + date + '.xlsx');
            showToast('已导出Excel');
        }
        
        // 导入Excel
        function importFromExcel(input) {
            if (typeof window.XLSX === 'undefined') {
                showToast('Excel功能加载中，请稍后重试');
                return;
            }
            
            if (!input.files || !input.files[0]) return;
            
            var file = input.files[0];
            var reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    var data = new Uint8Array(e.target.result);
                    var workbook = window.XLSX.read(data, { type: 'array' });
                    var sheetName = workbook.SheetNames[0];
                    var sheet = workbook.Sheets[sheetName];
                    var jsonData = window.XLSX.utils.sheet_to_json(sheet);
                    
                    if (jsonData.length === 0) {
                        showToast('文件中没有数据');
                        return;
                    }
                    
                    var importedCount = 0;
                    var itemMap = {};
                    
                    for (var i = 0; i < jsonData.length; i++) {
                        var row = jsonData[i];
                        var name = row['物品名称'] || row['name'] || '';
                        var categoryName = row['具体分类'] || row['category'] || '';
                        var type = categoryTypeMap[categoryName] || 
                                  (row['分类'] === '食物' ? 'food' : row['分类'] === '日用品' ? 'daily' : row['分类'] === '护肤品' ? 'skincare' : null);
                        
                        if (name && type && categoryName) {
                            var expireDate = row['过期日期'] || '';
                            var purchaseDate = row['购买日期'] || '';
                            
                            if (!itemMap[name]) {
                                itemMap[name] = {
                                    id: 'item_' + Date.now() + Math.random().toString(36).substr(2, 9),
                                    name: name,
                                    type: type,
                                    category: categoryName,
                                    pieces: [],
                                    reminderDays: row['临期提醒'] || 7,
                                    location: row['存放位置'] || '',
                                    createdAt: new Date().toISOString(),
                                    updatedAt: new Date().toISOString()
                                };
                            }
                            
                            itemMap[name].pieces.push({
                                id: 'piece_' + Date.now() + Math.random().toString(36).substr(2, 9),
                                purchaseDate: purchaseDate,
                                expireDate: expireDate,
                                validDays: 0
                            });
                            importedCount++;
                        }
                    }
                    
                    for (var key in itemMap) {
                        items.push(itemMap[key]);
                    }
                    saveItems();
                    renderItems();
                    showToast('成功导入 ' + importedCount + ' 件');
                } catch (err) {
                    console.error(err);
                    showToast('导入失败，请检查文件格式');
                }
            };
            
            reader.readAsArrayBuffer(file);
            input.value = '';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(message) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(function() {
                toast.classList.remove('show');
            }, 2500);
        }
        
        document.getElementById('itemModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        document.getElementById('alertModal').addEventListener('click', function(e) {
            if (e.target === this) closeAlert();
        });
        
        document.getElementById('duplicateModal').addEventListener('click', function(e) {
            if (e.target === this) closeDuplicateModal();
        });
        
        document.getElementById('imgPreviewModal').addEventListener('click', function(e) {
            if (e.target === this) closeImagePreview();
        });
        
        document.getElementById('confirmModal').addEventListener('click', function(e) {
            if (e.target === this) closeConfirmModal();
        });
        
        document.getElementById('authModal').addEventListener('click', function(e) {
            if (e.target === this) closeAuthModal();
        });
        
        // ========== 长按菜单功能 ==========
        var contextMenuTargetId = null;
        var longPressTimer = null;
        var isLongPress = false;
        
        // 显示右键菜单（桌面端）/触发长按（移动端）
        function showContextMenu(event, itemId) {
            event.preventDefault();
            contextMenuTargetId = itemId;
            
            var menu = document.getElementById('contextMenu');
            var x = event.clientX || (event.touches && event.touches[0].clientX) || 100;
            var y = event.clientY || (event.touches && event.touches[0].clientY) || 100;
            
            // 确保菜单不会超出屏幕
            var menuWidth = 180;
            var menuHeight = 200;
            var maxX = window.innerWidth - menuWidth - 10;
            var maxY = window.innerHeight - menuHeight - 10;
            
            x = Math.min(x, maxX);
            y = Math.min(y, maxY);
            
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            menu.classList.add('show');
        }
        
        // 关闭右键菜单
        function hideContextMenu() {
            document.getElementById('contextMenu').classList.remove('show');
            contextMenuTargetId = null;
        }
        
        // 绑定长按事件
        function bindLongPressEvents() {
            var cards = document.querySelectorAll('.item-card');
            cards.forEach(function(card) {
                var itemId = card.getAttribute('oncontextmenu');
                if (itemId) {
                    // 提取itemId
                    var match = itemId.match(/'([^']+)'\s*;/);
                    if (match) {
                        itemId = match[1];
                    }
                }
                
                // 触摸开始
                card.addEventListener('touchstart', function(e) {
                    isLongPress = false;
                    var targetItemId = extractItemIdFromCard(this);
                    longPressTimer = setTimeout(function() {
                        isLongPress = true;
                        showContextMenu(e, targetItemId);
                    }, 500);
                }, { passive: true });
                
                // 触摸移动
                card.addEventListener('touchmove', function(e) {
                    if (longPressTimer) {
                        clearTimeout(longPressTimer);
                        longPressTimer = null;
                    }
                }, { passive: true });
                
                // 触摸结束
                card.addEventListener('touchend', function(e) {
                    if (longPressTimer) {
                        clearTimeout(longPressTimer);
                        longPressTimer = null;
                    }
                    // 如果是长按且有打开菜单，阻止冒泡
                    if (isLongPress && document.getElementById('contextMenu').classList.contains('show')) {
                        e.preventDefault();
                    }
                });
                
                // 右键菜单
                card.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    var targetItemId = extractItemIdFromCard(this);
                    showContextMenu(e, targetItemId);
                });
            });
        }
        
        // 从卡片提取itemId
        function extractItemIdFromCard(card) {
            var onclick = card.getAttribute('oncontextmenu') || '';
            var match = onclick.match(/'([^']+)'/);
            return match ? match[1] : null;
        }
        
        // 点击其他地方关闭菜单
        document.addEventListener('click', function(e) {
            var menu = document.getElementById('contextMenu');
            if (menu && !menu.contains(e.target) && !e.target.closest('.item-card')) {
                hideContextMenu();
            }
            
            // 关闭设置面板
            var settingsModal = document.getElementById('settingsModal');
            var settingsContent = settingsModal ? settingsModal.querySelector('.settings-content') : null;
            if (settingsModal && settingsModal.classList.contains('show') && 
                settingsContent && !settingsContent.contains(e.target) && 
                !e.target.closest('.settings-btn')) {
                closeSettingsModal();
            }
        });
        
        // 复制信息
        function contextCopyInfo() {
            if (!contextMenuTargetId) return;
            var item = findItemById(contextMenuTargetId);
            if (!item) return;
            
            var info = item.name;
            if (item.pieces && item.pieces.length > 0) {
                info += '，过期日期：' + item.pieces[0].expireDate;
            }
            if (item.location) {
                info += '，存放位置：' + item.location;
            }
            
            try {
                navigator.clipboard.writeText(info).then(function() {
                    showToast('已复制');
                }).catch(function() {
                    // fallback
                    var textarea = document.createElement('textarea');
                    textarea.value = info;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast('已复制');
                });
            } catch (e) {
                showToast('复制失败');
            }
            
            hideContextMenu();
        }
        
        // 分享
        function contextShare() {
            if (!contextMenuTargetId) return;
            var item = findItemById(contextMenuTargetId);
            if (!item) return;
            
            var info = item.name;
            if (item.pieces && item.pieces.length > 0) {
                var daysLeft = getDaysLeft(item.pieces[0].expireDate);
                if (daysLeft < 0) {
                    info += ' - 已过期' + Math.abs(daysLeft) + '天';
                } else {
                    info += ' - 剩余' + daysLeft + '天过期';
                }
            }
            info += '\n分类：' + item.category;
            if (item.location) {
                info += '\n存放位置：' + item.location;
            }
            
            // 尝试使用 Web Share API
            if (navigator.share) {
                navigator.share({
                    title: '过期了么 - ' + item.name,
                    text: info
                }).catch(function() {
                    // 用户取消分享
                });
            } else {
                // fallback: 复制到剪贴板
                try {
                    navigator.clipboard.writeText(info).then(function() {
                        showToast('信息已复制，可粘贴分享');
                    }).catch(function() {
                        showToast('分享功能不可用');
                    });
                } catch (e) {
                    showToast('分享功能不可用');
                }
            }
            
            hideContextMenu();
        }
        
        // 编辑
        function contextEdit() {
            if (!contextMenuTargetId) return;
            editItem(contextMenuTargetId);
            hideContextMenu();
        }
        
        // 删除
        function contextDelete() {
            if (!contextMenuTargetId) return;
            deleteItem(contextMenuTargetId);
            hideContextMenu();
        }
    </script>
